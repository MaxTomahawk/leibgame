<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leib — Game Platform</title>
    <link rel="stylesheet" href="platform/platform.css">
    <link rel="icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="platform-bg min-h-screen flex flex-col items-center justify-center p-6">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-white mb-2 drop-shadow-lg">Leib</h1>
            <p class="text-indigo-200 text-lg">Choose your adventure</p>
        </header>

        <div id="game-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl w-full">
            <!-- Populated by platform.js -->
        </div>

        <footer class="mt-12 text-indigo-300 text-sm opacity-70">
            <span id="asset-status">Loading asset library...</span>
        </footer>
    </div>
    <script type="module" src="platform/platform.js"></script>
</body>
</html>
