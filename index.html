<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leibgame — Multi-Game Platform</title>
    <link rel="stylesheet" href="platform/hub.css">
    <link rel="icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="hub-bg text-white">

    <main class="min-h-screen flex flex-col items-center justify-center px-4 py-12">
        <header class="text-center mb-10">
            <h1 id="hub-title" class="text-4xl sm:text-5xl font-extrabold mb-2 tracking-tight">Leibgame</h1>
            <p class="text-indigo-200/90 text-lg">Pick a game to play</p>
        </header>

        <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6 w-full max-w-2xl" data-testid="game-grid">
            <!-- populated by platform/hub.js -->
        </div>

        <footer class="mt-12 text-center text-xs text-white/40 font-mono">
            <span id="hub-version">v...</span>
        </footer>
    </main>

    <script type="module" src="platform/hub.js"></script>

</body>
</html>
