name: Auto Version on Push

on:
  push:
    branches:
      - main  # or 'master' if that's your default branch

jobs:
  update-version:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Get full git history
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate version.json
        run: |
          echo "{" > version.json
          echo "  \"commit\": \"$(git rev-parse --short HEAD)\"," >> version.json
          echo "  \"commitFull\": \"$(git rev-parse HEAD)\"," >> version.json
          echo "  \"date\": \"$(date -u +"%Y-%m-%d %H:%M:%S UTC")\"," >> version.json
          echo "  \"timestamp\": $(date +%s)" >> version.json
          echo "}" >> version.json
          cat version.json
      
      - name: Check if version.json changed
        id: check_changes
        run: |
          git diff --exit-code version.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push version.json
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "🤖 Auto-update version.json [skip ci]"
          git push